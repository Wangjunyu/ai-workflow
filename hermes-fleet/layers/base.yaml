# 所有 Hermes 实例通用基础层

display:
  tool_progress: true
  show_cost: false

compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20

security:
  redact_secrets: true
  tirith_enabled: false

approvals:
  mode: smart

agent:
  max_turns: 90
  tool_use_enforcement: true

terminal:
  backend: local
  timeout: 300

memory:
  memory_enabled: true
  user_profile_enabled: true
