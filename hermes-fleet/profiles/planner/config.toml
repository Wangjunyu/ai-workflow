[model]
provider = "deepseek"
default = "deepseek-v4-pro"
base_url = "https://api.deepseek.com/v1"

[agent]
max_turns = 90
gateway_timeout = 900

[terminal]
backend = "local"
cwd = "/home/leon"

[display]
compact = true
personality = "helpful"
show_reasoning = false
streaming = true

[memory]
provider = "mem0"

[skills]
external_dirs = ["/home/leon/.hermes/skills"]
