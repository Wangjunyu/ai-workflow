[model]
provider = "deepseek"
default = "deepseek-v4-pro"
base_url = "https://api.deepseek.com/v1"

[agent]
max_turns = 60
gateway_timeout = 900

[terminal]
backend = "local"
cwd = "/Users/leon"

[display]
compact = true
personality = "concise"
show_reasoning = false
streaming = true

[memory]
provider = "mem0"
